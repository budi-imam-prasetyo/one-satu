services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/pbo_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

  # --- FRONTEND (Bun / Vite) ---
  frontend:
    image: oven/bun:1.3.13
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "bun install && bun run dev --host 0.0.0.0"
    stdin_open: true
    tty: true

  # --- DATABASE (MySQL 9.0) ---
  db:
    image: mysql:9.0
    restart: always
    environment:
      MYSQL_DATABASE: pbo_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- DATABASE MANAGEMENT (phpMyAdmin) ---
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy

# --- PERSISTENT STORAGE ---
volumes:
  db_data:
  maven_cache:
  frontend_node_modules:
