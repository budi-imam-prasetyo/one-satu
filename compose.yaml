services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/pbo_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2

    depends_on:
      db:
        condition: service_healthy

    stdin_open: true
    tty: true

  db:
    image: mysql:9.0

    restart: always

    environment:
      MYSQL_DATABASE: pbo_db
      MYSQL_ROOT_PASSWORD: password

    ports:
      - "3306:3306"

    volumes:
      - db_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  maven_cache:
