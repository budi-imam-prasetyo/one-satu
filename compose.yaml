services:
  # =========================
  # BACKEND (SPRING BOOT)
  # =========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tago-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/pbo_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - tago-network

  # =========================
  # FRONTEND DEV (BUN + VITE)
  # =========================
  frontend-dev:
    image: oven/bun:1.3.13
    container_name: tago-frontend-dev
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      VITE_SUPABASE_URL: http://localhost:8000
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    command: sh -c "bun install && bun run dev --host 0.0.0.0"
    restart: unless-stopped
    stdin_open: true
    tty: true
    profiles:
      - dev
    depends_on:
      - supabase-api
    networks:
      - tago-network

  # =========================
  # FRONTEND PROD (NGINX)
  # =========================
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: tago-frontend-prod
    ports:
      - "80:80"
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    restart: unless-stopped
    profiles:
      - prod
    networks:
      - tago-network

  # =========================
  # MYSQL DATABASE
  # =========================
  db:
    image: mysql:9.0
    container_name: tago-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pbo_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tago-network

  # =========================
  # PHPMYADMIN
  # =========================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: tago-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tago-network

  # =========================
  # SUPABASE POSTGRES
  # =========================
  supabase-db:
    image: supabase/postgres:15.1.0.147
    container_name: tago-supabase-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
      - ./frontend/supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tago-network

  # =========================
  # SUPABASE API
  # =========================
  supabase-api:
    image: postgrest/postgrest:v11.2.0
    container_name: tago-supabase-api
    restart: unless-stopped
    ports:
      - "8000:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - tago-network

  # =========================
  # SUPABASE STUDIO
  # =========================
  supabase-studio:
    image: supabase/studio:20231123-64a766c
    container_name: tago-supabase-studio
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SUPABASE_URL: http://supabase-api:3000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      STUDIO_PG_META_URL: http://supabase-api:3000/pg
    depends_on:
      - supabase-api
    networks:
      - tago-network

networks:
  tago-network:
    driver: bridge

volumes:
  db_data:
  maven_cache:
  frontend_node_modules:
  supabase_db_data:
