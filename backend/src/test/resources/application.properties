# Menggunakan database H2 di memori ram lokal selama test berjalan
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Memberitahu Hibernate untuk menggunakan dialek H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Otomatis membuat struktur tabel berdasarkan entitas JPA kamu saat test berjalan
spring.jpa.hibernate.ddl-auto=create-drop

# JWT test config
jwt.secret=test-secret-for-jwt-signing-please-change
jwt.expiration=900000

